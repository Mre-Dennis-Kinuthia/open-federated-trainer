apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fed-compute.fullname" . }}
  labels:
    {{- include "fed-compute.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fed-compute.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fed-compute.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: coordinator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: OPERATOR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fed-compute.fullname" . }}-secrets
                  key: OPERATOR_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fed-compute.fullname" . }}-secrets
                  key: DATABASE_URL
            - name: S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fed-compute.fullname" . }}-secrets
                  key: S3_ENDPOINT_URL
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fed-compute.fullname" . }}-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fed-compute.fullname" . }}-secrets
                  key: S3_SECRET_KEY
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
