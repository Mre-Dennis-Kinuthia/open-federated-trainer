upstream coordinator_api {
  least_conn;
  server coordinator-a:8000 max_fails=3 fail_timeout=10s;
  server coordinator-b:8000 max_fails=3 fail_timeout=10s;
}

# Docker embedded DNS — re-resolve after coordinator recreate (avoids sticky 502s).
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP → HTTPS redirect (lab)
server {
  listen 80;
  server_name _;
  return 301 https://$host:8443$request_uri;
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;

  location /health {
    proxy_pass http://coordinator_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /ready {
    proxy_pass http://coordinator_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    proxy_pass http://coordinator_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 300s;
    client_max_body_size 64m;
  }
}
