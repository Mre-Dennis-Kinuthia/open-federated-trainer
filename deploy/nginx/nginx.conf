upstream coordinator_api {
  # Sticky by client IP so UI polls don't alternate empty/full
  # in-memory views before durable refresh (HA still shares Postgres).
  ip_hash;
  server coordinator-a:8000 max_fails=3 fail_timeout=10s;
  server coordinator-b:8000 max_fails=3 fail_timeout=10s;
}

# Docker embedded DNS — re-resolve after coordinator recreate (avoids sticky 502s).
resolver 127.0.0.11 valid=10s ipv6=off;

# Lab HTTP API (no TLS) — for browser UIs that cannot trust the self-signed
# cert on :8443 (e.g. Vercel → localhost). Prefer :8443 for real clients.
server {
  listen 80;
  server_name _;

  location / {
    proxy_pass http://coordinator_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;
    proxy_read_timeout 300s;
    client_max_body_size 64m;
  }
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;

  location /health {
    proxy_pass http://coordinator_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /ready {
    proxy_pass http://coordinator_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    proxy_pass http://coordinator_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 300s;
    client_max_body_size 64m;
  }
}
