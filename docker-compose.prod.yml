# Production-oriented stack: Postgres + MinIO + 2 API replicas + nginx LB + train clients.
# Does not change the default `docker compose up` quick-start path.
#
#   ./scripts/stop-local-trainers.sh   # optional: kill host ui-train clients on :8000
#   ./scripts/gen-dev-certs.sh
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile production up -d --build
#
# Lab default: operator auth off (empty OPERATOR_API_KEY). To lock privileged
# actions later: export OPERATOR_API_KEY=... and REQUIRE_OPERATOR_KEY=true
#
# API via TLS edge: https://localhost:8443  (HTTP :8080 redirects)
# Train clients talk to coordinator-a/b on the Docker network (not the JSON :8000 service).

x-coordinator-env: &coordinator-env
  PYTHONUNBUFFERED: "1"
  ENABLE_ASYNC_ROUNDS: "true"
  ASYNC_MIN_UPDATES: "2"
  ASYNC_MAX_DURATION: "300"
  METADATA_BACKEND: postgres
  DATABASE_URL: postgresql+psycopg2://fedcompute:fedcompute@postgres:5432/fedcompute
  ARTIFACT_STORE: s3
  S3_ENDPOINT_URL: http://minio:9000
  S3_BUCKET: fedcompute-artifacts
  S3_PREFIX: artifacts
  S3_ACCESS_KEY: fedcompute
  S3_SECRET_KEY: fedcompute-secret
  S3_REGION: us-east-1
  # Open lab mode: no operator key required until you set OPERATOR_API_KEY.
  REQUIRE_OPERATOR_KEY: ${REQUIRE_OPERATOR_KEY:-false}
  OPERATOR_API_KEY: ${OPERATOR_API_KEY:-}
  CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost:8443,http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}
  SHARED_STATE: auto
  # Spawn train/worker processes from the operator Launch page.
  ALLOW_SYNTHETIC_DATA: ${ALLOW_SYNTHETIC_DATA:-true}

x-coordinator-health: &coordinator-health
  test:
    [
      "CMD",
      "python",
      "-c",
      "import http.client; c=http.client.HTTPConnection('localhost',8000); c.request('GET','/ready'); r=c.getresponse(); raise SystemExit(0 if r.status==200 else 1)",
    ]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 45s

x-train-client: &train-client
  profiles: ["production"]
  build:
    context: ./client
    dockerfile: Dockerfile
  environment:
    COORDINATOR_URL: http://coordinator-a:8000
    ALLOW_SYNTHETIC_DATA: ${ALLOW_SYNTHETIC_DATA:-true}
    DATASET_PATH: ${DATASET_PATH:-}
    CLIENT_API_KEY: ${CLIENT_API_KEY:-}
    MAX_RETRIES: "3"
    SLEEP_BETWEEN_ROUNDS: "5.0"
    RETRY_DELAY: "2.0"
    PYTHONUNBUFFERED: "1"
  depends_on:
    coordinator-a:
      condition: service_healthy
    coordinator-b:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - federated-network

services:
  # Keep the JSON single-node coordinator off the production profile so :8000
  # is not mixed with the HA edge. Use plain `docker compose up` for that path.
  coordinator:
    profiles: ["json-demo"]

  # Base `client` service is replaced by client-1/client-2 below under production.
  client:
    profiles: ["json-demo"]

  postgres:
    profiles: ["durable", "production"]

  minio:
    profiles: ["durable", "production"]

  minio-init:
    profiles: ["production"]
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 fedcompute fedcompute-secret; do sleep 1; done;
      mc mb -p local/fedcompute-artifacts || true;
      exit 0;
      "
    networks:
      - federated-network

  coordinator-a:
    profiles: ["production"]
    build:
      context: ./coordinator
      dockerfile: Dockerfile
    container_name: federated-coordinator-a
    environment:
      <<: *coordinator-env
      ENABLE_LOCAL_LAUNCHER: ${ENABLE_LOCAL_LAUNCHER:-true}
      CLIENT_ROOT: /client
      CLIENT_PYTHON: python3
      PUBLIC_COORDINATOR_URL: http://coordinator-a:8000
      LAUNCH_LOG_DIR: /app/logs/launch
    volumes:
      - ./client:/client:ro
      - ./coordinator/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      <<: *coordinator-health
    restart: unless-stopped
    networks:
      - federated-network

  coordinator-b:
    profiles: ["production"]
    build:
      context: ./coordinator
      dockerfile: Dockerfile
    container_name: federated-coordinator-b
    environment:
      <<: *coordinator-env
      # Same launcher surface as A so edge least_conn never flips the UI off.
      ENABLE_LOCAL_LAUNCHER: ${ENABLE_LOCAL_LAUNCHER:-true}
      CLIENT_ROOT: /client
      CLIENT_PYTHON: python3
      PUBLIC_COORDINATOR_URL: http://coordinator-a:8000
      LAUNCH_LOG_DIR: /app/logs/launch
    volumes:
      - ./client:/client:ro
      - ./coordinator/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      <<: *coordinator-health
    restart: unless-stopped
    networks:
      - federated-network

  edge:
    profiles: ["production"]
    image: nginx:1.27-alpine
    container_name: federated-edge
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      coordinator-a:
        condition: service_healthy
      coordinator-b:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - federated-network

  # Two synthetic demo trainers so ASYNC_MIN_UPDATES=2 can aggregate.
  # Override ALLOW_SYNTHETIC_DATA=false and mount DATASET_PATH for real data.
  client-1:
    <<: *train-client
    container_name: federated-client-1
    environment:
      COORDINATOR_URL: http://coordinator-a:8000
      ALLOW_SYNTHETIC_DATA: ${ALLOW_SYNTHETIC_DATA:-true}
      DATASET_PATH: ${DATASET_PATH:-}
      CLIENT_NAME: prod-client-a
      MAX_RETRIES: "3"
      SLEEP_BETWEEN_ROUNDS: "5.0"
      RETRY_DELAY: "2.0"
      PYTHONUNBUFFERED: "1"
    volumes:
      - client-keys-1:/app/data

  client-2:
    <<: *train-client
    container_name: federated-client-2
    environment:
      # Same replica as client-1 so async min-updates aggregation sees both
      # submissions in-process; HA state still shared via Postgres.
      COORDINATOR_URL: http://coordinator-a:8000
      ALLOW_SYNTHETIC_DATA: ${ALLOW_SYNTHETIC_DATA:-true}
      DATASET_PATH: ${DATASET_PATH:-}
      CLIENT_NAME: prod-client-b
      MAX_RETRIES: "3"
      SLEEP_BETWEEN_ROUNDS: "5.0"
      RETRY_DELAY: "2.0"
      PYTHONUNBUFFERED: "1"
    volumes:
      - client-keys-2:/app/data

volumes:
  client-keys-1:
  client-keys-2:
