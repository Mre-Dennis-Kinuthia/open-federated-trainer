# Production-oriented stack: Postgres + MinIO + 2 API replicas + nginx LB.
# Does not change the default `docker compose up` quick-start path.
#
#   export OPERATOR_API_KEY="$(openssl rand -hex 16)"
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile production up -d --build
#
# API via TLS edge: https://localhost:8443  (HTTP :8080 redirects)
# First: ./scripts/gen-dev-certs.sh

x-coordinator-env: &coordinator-env
  PYTHONUNBUFFERED: "1"
  ENABLE_ASYNC_ROUNDS: "true"
  ASYNC_MIN_UPDATES: "2"
  ASYNC_MAX_DURATION: "300"
  METADATA_BACKEND: postgres
  DATABASE_URL: postgresql+psycopg2://fedcompute:fedcompute@postgres:5432/fedcompute
  ARTIFACT_STORE: s3
  S3_ENDPOINT_URL: http://minio:9000
  S3_BUCKET: fedcompute-artifacts
  S3_PREFIX: artifacts
  S3_ACCESS_KEY: fedcompute
  S3_SECRET_KEY: fedcompute-secret
  S3_REGION: us-east-1
  REQUIRE_OPERATOR_KEY: "true"
  OPERATOR_API_KEY: ${OPERATOR_API_KEY:?set OPERATOR_API_KEY}
  CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost:8443,http://localhost:8080,http://127.0.0.1:8080}
  SHARED_STATE: auto

x-coordinator-health: &coordinator-health
  test:
    [
      "CMD",
      "python",
      "-c",
      "import http.client; c=http.client.HTTPConnection('localhost',8000); c.request('GET','/ready'); r=c.getresponse(); raise SystemExit(0 if r.status==200 else 1)",
    ]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 45s

services:
  postgres:
    profiles: ["durable", "production"]

  minio:
    profiles: ["durable", "production"]

  minio-init:
    profiles: ["production"]
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 fedcompute fedcompute-secret; do sleep 1; done;
      mc mb -p local/fedcompute-artifacts || true;
      exit 0;
      "
    networks:
      - federated-network

  coordinator-a:
    profiles: ["production"]
    build:
      context: ./coordinator
      dockerfile: Dockerfile
    container_name: federated-coordinator-a
    environment:
      <<: *coordinator-env
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      <<: *coordinator-health
    restart: unless-stopped
    networks:
      - federated-network

  coordinator-b:
    profiles: ["production"]
    build:
      context: ./coordinator
      dockerfile: Dockerfile
    container_name: federated-coordinator-b
    environment:
      <<: *coordinator-env
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      <<: *coordinator-health
    restart: unless-stopped
    networks:
      - federated-network

  edge:
    profiles: ["production"]
    image: nginx:1.27-alpine
    container_name: federated-edge
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      coordinator-a:
        condition: service_healthy
      coordinator-b:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - federated-network
