version: "3.8"

services:
  coordinator:
    build:
      context: ./coordinator
      dockerfile: Dockerfile
    container_name: federated-coordinator
    ports:
      - "8000:8000"
    volumes:
      - ./coordinator/models:/app/models
      - ./coordinator/metrics:/app/metrics
      - ./coordinator/logs:/app/logs
      - ./coordinator/data:/app/data
      - ./coordinator/artifacts:/app/artifacts
      - ./adapters:/app/adapters
    environment:
      - PYTHONUNBUFFERED=1
      - ENABLE_ASYNC_ROUNDS=true
      - ASYNC_MIN_UPDATES=2
      - ASYNC_MAX_DURATION=300
      - OPERATOR_API_KEY=${OPERATOR_API_KEY:-dev-operator-change-me}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - METADATA_BACKEND=${METADATA_BACKEND:-json}
      - DATABASE_URL=${DATABASE_URL:-}
      - ARTIFACT_STORE=${ARTIFACT_STORE:-local}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; conn = http.client.HTTPConnection('localhost', 8000); conn.request('GET', '/health'); r = conn.getresponse(); exit(0 if r.status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - federated-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      - COORDINATOR_URL=http://coordinator:8000
      - CLIENT_NAME=${CLIENT_NAME:-}
      - CLIENT_API_KEY=${CLIENT_API_KEY:-}
      - DATASET_PATH=${DATASET_PATH:-}
      # Local compose demo: synthetic features when no DATASET_PATH is mounted.
      - ALLOW_SYNTHETIC_DATA=${ALLOW_SYNTHETIC_DATA:-true}
      - MAX_RETRIES=3
      - SLEEP_BETWEEN_ROUNDS=5.0
      - RETRY_DELAY=2.0
      - PYTHONUNBUFFERED=1
      - HOSTNAME
    volumes:
      - client-keys:/app/data
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - federated-network
    restart: unless-stopped

  # Optional durable stack: docker compose --profile durable up -d
  postgres:
    profiles: ["durable"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fedcompute
      POSTGRES_PASSWORD: fedcompute
      POSTGRES_DB: fedcompute
    ports:
      - "5432:5432"
    volumes:
      - fedcompute-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fedcompute -d fedcompute"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - federated-network

  minio:
    profiles: ["durable"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fedcompute
      MINIO_ROOT_PASSWORD: fedcompute-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fedcompute-minio:/data
    networks:
      - federated-network

networks:
  federated-network:
    driver: bridge

volumes:
  client-keys:
  fedcompute-pg:
  fedcompute-minio:
