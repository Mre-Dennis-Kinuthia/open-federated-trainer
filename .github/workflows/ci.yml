name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install coordinator deps
        run: |
          python -m pip install --upgrade pip
          pip install -r coordinator/requirements.txt pytest
      - name: Run pytest
        working-directory: .
        run: python -m pytest tests/ -q
        env:
          GEO_LOOKUP_DISABLED: "true"

  ui:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  load-fault:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [pytest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install coordinator + uvicorn
        run: |
          python -m pip install --upgrade pip
          pip install -r coordinator/requirements.txt uvicorn
      - name: Load + fault (k6 via Docker)
        run: |
          chmod +x scripts/ci-load-fault.sh
          PYTHON="$(command -v python)" ./scripts/ci-load-fault.sh
